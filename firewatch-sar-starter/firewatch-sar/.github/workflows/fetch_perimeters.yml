name: Fetch Fire Perimeters

on:
  schedule:
    # Runs every 6 hours (WFIGS updates multiple times daily)
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  fetch-perimeters:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch fire perimeters (WFIGS + CONAFOR)
        run: python scripts/fetch_perimeters.py

      - name: Commit updated perimeter data
        run: |
          git config user.name "FireWatch Bot"
          git config user.email "bot@firewatch-sar.github.io"
          git add data/perimeters.geojson
          git diff --staged --quiet || git commit -m "chore: update perimeters $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
