name: Fetch Weather & Compute FWI

on:
  schedule:
    # Runs every hour at minute 15
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch weather and compute FWI
        run: python scripts/fetch_weather.py

      - name: Commit updated weather and FWI data
        run: |
          git config user.name "FireWatch Bot"
          git config user.email "bot@firewatch-sar.github.io"
          git add data/weather.geojson data/fwi_grid.geojson
          git diff --staged --quiet || git commit -m "chore: update weather+FWI $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
